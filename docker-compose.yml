services:
  postgres:
    image: postgres:16-alpine
    container_name: bongofleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bongofleet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bongofleet_dev_password}
      POSTGRES_DB: ${DB_NAME:-bongofleet}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - bongofleet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bongofleet}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bongofleet-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - bongofleet_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bongofleet-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@bongofleet.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    volumes:
      - bongofleet_pgadmindata:/var/lib/pgadmin

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: bongofleet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      # Host is the service name `postgres`/`redis`, not localhost - this container
      # reaches them over the compose network, not the host's forwarded ports (which
      # have a known Docker Desktop / Windows Postgres SCRAM auth bug).
      DATABASE_URL: postgresql://${DB_USER:-bongofleet}:${DB_PASSWORD:-bongofleet_dev_password}@postgres:5432/${DB_NAME:-bongofleet}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      UPLOADS_DIR: /workspace/uploads
    ports:
      - "3000:3000"
    volumes:
      - bongofleet_uploads:/workspace/uploads

volumes:
  bongofleet_pgdata:
  bongofleet_redisdata:
  bongofleet_pgadmindata:
  bongofleet_uploads:
